name: fit_track
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.1
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.0.1
  flutter_animate: ^4.5.2
  fl_chart: ^1.1.1
  json_annotation: ^4.10.0
  json_serializable: ^6.12.0
  build_runner: ^2.11.1
  animated_bottom_navigation_bar: ^1.4.0
  auto_size_text: ^3.0.0
  circular_reveal_animation: ^2.0.2
  video_player: ^2.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/videos/bg.mp4

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700

